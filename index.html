<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>SWEAT.EXE</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

:root{
  --bg:#0B0B18;
  --panel:#13132A;
  --panel2:#1A1A38;
  --border:#2E2E60;
  --border2:#4A4A90;
  --gold:#C8A44A;
  --gold2:#E8C878;
  --coral:#D4604A;
  --teal:#4ABCAA;
  --purple:#8870C8;
  --green:#50C870;
  --text:#CCC8F0;
  --muted:#7070A0;
  --nav-h:60px;
  --safe-bot: env(safe-area-inset-bottom, 0px);
}

html{scroll-behavior:smooth;-webkit-text-size-adjust:100%;}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'VT323',monospace;
  font-size:18px;
  min-height:100vh;
  overflow-x:hidden;
  /* bottom space for fixed nav + safe area */
  padding-bottom:calc(var(--nav-h) + var(--safe-bot));
}

/* CRT scanlines */
body::after{
  content:'';
  position:fixed;
  inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.03) 3px,rgba(0,0,0,0.03) 4px);
  pointer-events:none;
  z-index:8000;
}

/* ── PANELS ─────────────────────────────────────────────────── */
.panel{
  background:var(--panel);
  border:2px solid var(--border);
  position:relative;
  padding:14px;
  margin-bottom:12px;
}
.panel::before{
  content:'';
  position:absolute;
  inset:3px;
  border:1px solid var(--border2);
  pointer-events:none;
  opacity:0.35;
}
.panel-gold{border-color:var(--gold);}
.panel-gold::before{border-color:var(--gold2);opacity:0.45;}
.panel-teal{border-color:var(--teal);}
.panel-teal::before{border-color:var(--teal);opacity:0.3;}

/* ── HEADER ─────────────────────────────────────────────────── */
.app-header{
  background:var(--panel);
  border-bottom:2px solid var(--gold);
  padding:12px 16px;
  padding-top:calc(12px + env(safe-area-inset-top,0px));
  display:flex;
  align-items:center;
  justify-content:space-between;
  position:sticky;
  top:0;
  z-index:500;
}
.app-title{
  font-family:'Press Start 2P',monospace;
  font-size:clamp(9px,3vw,14px);
  color:var(--gold);
  letter-spacing:1px;
  text-shadow:0 0 18px rgba(200,164,74,0.45);
  line-height:1.4;
}
.app-title .sub{
  display:block;
  color:var(--coral);
  font-size:clamp(7px,2vw,10px);
  margin-top:2px;
  letter-spacing:2px;
}
.header-right{
  font-family:'Press Start 2P',monospace;
  font-size:clamp(7px,1.8vw,9px);
  color:var(--teal);
  text-align:right;
  line-height:2;
}

/* ── BOTTOM NAV (mobile first) ─────────────────────────────── */
.bottom-nav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  height:calc(var(--nav-h) + var(--safe-bot));
  background:var(--panel);
  border-top:2px solid var(--gold);
  display:flex;
  align-items:stretch;
  z-index:600;
  padding-bottom:var(--safe-bot);
}
.bnav-item{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:4px;
  border:none;
  background:transparent;
  cursor:pointer;
  color:var(--muted);
  transition:color 0.15s,background 0.15s;
  position:relative;
  padding:0 4px;
  min-height:44px;
  -webkit-tap-highlight-color:transparent;
}
.bnav-item::before{
  content:'';
  position:absolute;
  top:0;left:0;right:0;
  height:3px;
  background:var(--gold);
  transform:scaleX(0);
  transition:transform 0.15s;
}
.bnav-item.active{color:var(--gold);}
.bnav-item.active::before{transform:scaleX(1);}
.bnav-item:active{background:rgba(200,164,74,0.06);}
.bnav-icon{font-size:20px;line-height:1;}
.bnav-label{
  font-family:'Press Start 2P',monospace;
  font-size:6px;
  letter-spacing:0.3px;
  white-space:nowrap;
}

/* Desktop: top nav instead */
@media(min-width:640px){
  body{padding-bottom:0;}
  .bottom-nav{display:none;}
  .top-nav{display:flex!important;}
}
.top-nav{
  display:none;
  background:var(--panel);
  border-bottom:2px solid var(--border);
  overflow-x:auto;
  scrollbar-width:none;
}
.top-nav::-webkit-scrollbar{display:none;}
.tnav-item{
  font-family:'Press Start 2P',monospace;
  font-size:8px;
  padding:14px 18px;
  color:var(--muted);
  cursor:pointer;
  border:none;
  background:transparent;
  white-space:nowrap;
  position:relative;
  transition:color 0.15s;
  letter-spacing:0.5px;
}
.tnav-item::after{
  content:'';
  position:absolute;
  bottom:0;left:0;right:0;
  height:3px;
  background:var(--gold);
  transform:scaleX(0);
  transition:transform 0.15s;
}
.tnav-item:hover{color:var(--text);}
.tnav-item.active{color:var(--gold);}
.tnav-item.active::after{transform:scaleX(1);}

/* ── PAGE ───────────────────────────────────────────────────── */
.page{
  padding:16px;
  max-width:860px;
  margin:0 auto;
}

/* ── TYPOGRAPHY ─────────────────────────────────────────────── */
.px-label{
  font-family:'Press Start 2P',monospace;
  font-size:8px;
  color:var(--muted);
  letter-spacing:1px;
  text-transform:uppercase;
  margin-bottom:6px;
  display:block;
  line-height:1.8;
}
.px-label-gold{color:var(--gold);}
.px-label-teal{color:var(--teal);}
.px-label-coral{color:var(--coral);}

.section-title{
  font-family:'Press Start 2P',monospace;
  font-size:clamp(8px,2.5vw,10px);
  color:var(--gold);
  letter-spacing:2px;
  margin-bottom:14px;
  display:flex;
  align-items:center;
  gap:10px;
}
.section-title::before{content:'◆';font-size:7px;color:var(--coral);flex-shrink:0;}
.section-title::after{content:'';flex:1;height:1px;background:var(--border);min-width:0;}

/* ── STAT BARS ──────────────────────────────────────────────── */
.big-stat{font-family:'VT323',monospace;font-size:42px;line-height:1;color:var(--gold2);}
.big-stat.teal{color:var(--teal);}
.big-stat.coral{color:var(--coral);}
.big-stat.green{color:var(--green);}
.big-stat.purple{color:var(--purple);}

.bar-wrap{width:100%;background:var(--bg);height:14px;border:1px solid var(--border2);position:relative;overflow:hidden;flex-shrink:0;}
.bar-fill{height:100%;transition:width 0.7s ease;position:relative;}
.bar-fill::after{content:'';position:absolute;top:2px;left:2px;right:2px;height:3px;background:rgba(255,255,255,0.12);}
.bar-hp{background:linear-gradient(90deg,#8A2020,var(--coral));}
.bar-exp{background:linear-gradient(90deg,#1a3a70,var(--teal));}
.bar-str{background:linear-gradient(90deg,#301860,var(--purple));}

.stat-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.stat-row .stat-name{font-family:'Press Start 2P',monospace;font-size:7px;color:var(--muted);width:30px;flex-shrink:0;}
.stat-row .stat-val{font-family:'VT323',monospace;font-size:20px;color:var(--text);width:36px;text-align:right;flex-shrink:0;}
.stat-row .bar-wrap{flex:1;min-width:0;}

/* ── CHARACTER PANEL ────────────────────────────────────────── */
.char-grid{display:flex;gap:14px;align-items:flex-start;}
.char-avatar{
  width:88px;height:88px;min-width:88px;
  background:var(--panel2);
  border:2px solid var(--border2);
  display:flex;align-items:center;justify-content:center;
  font-size:44px;
  position:relative;
}
.char-avatar::after{content:'';position:absolute;inset:4px;border:1px solid var(--border);pointer-events:none;}
.level-badge{
  position:absolute;bottom:-9px;left:50%;transform:translateX(-50%);
  background:var(--gold);color:var(--bg);
  font-family:'Press Start 2P',monospace;font-size:6px;
  padding:3px 7px;white-space:nowrap;
}
.char-info{flex:1;min-width:0;}
.char-status{font-family:'VT323',monospace;font-size:clamp(18px,5vw,24px);color:var(--gold2);margin-bottom:10px;}

/* ── MISSION BOX ────────────────────────────────────────────── */
.mission-box{
  background:var(--panel2);border:2px solid var(--teal);
  padding:14px 14px 14px 14px;margin-bottom:12px;position:relative;
  margin-top:10px;
}
.mission-box::before{
  content:'► ACTIVE MISSION';
  position:absolute;top:-9px;left:10px;
  background:var(--bg);padding:0 8px;
  font-family:'Press Start 2P',monospace;font-size:6px;color:var(--teal);
  white-space:nowrap;
}
.mission-name{font-family:'VT323',monospace;font-size:clamp(22px,6vw,28px);color:var(--gold2);margin-bottom:4px;}
.mission-sub{font-family:'VT323',monospace;font-size:clamp(16px,4.5vw,20px);color:var(--muted);}

/* ── DIALOG / QUOTE ─────────────────────────────────────────── */
.dialog-box{
  background:var(--panel);border:3px solid var(--gold);
  padding:14px 14px 14px 50px;
  position:relative;margin-bottom:16px;
}
.dialog-box::before{content:'';position:absolute;top:3px;left:3px;right:3px;bottom:3px;border:1px solid rgba(200,164,74,0.18);pointer-events:none;}
.dialog-portrait{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:26px;line-height:1;}
.dialog-speaker{font-family:'Press Start 2P',monospace;font-size:clamp(6px,1.8vw,7px);color:var(--gold);margin-bottom:6px;display:block;}
.dialog-text{font-family:'VT323',monospace;font-size:clamp(17px,4.5vw,20px);color:var(--text);line-height:1.4;}
.blink{animation:blink 1s step-end infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}

/* ── STREAK ─────────────────────────────────────────────────── */
.streak-banner{
  background:rgba(200,80,50,0.1);border:2px solid var(--coral);
  padding:12px 14px;margin-bottom:12px;
  display:flex;align-items:center;gap:12px;
}
.streak-fire{font-size:24px;animation:pulse 1s ease-in-out infinite alternate;flex-shrink:0;}
@keyframes pulse{from{transform:scale(1);}to{transform:scale(1.15);}}
.streak-text{font-family:'Press Start 2P',monospace;font-size:clamp(6px,1.8vw,8px);color:var(--coral);line-height:2;}

/* ── STATS GRID ─────────────────────────────────────────────── */
.stats-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  margin-bottom:14px;
}
@media(min-width:500px){.stats-grid{grid-template-columns:repeat(4,1fr);}}
.mini-stat{background:var(--panel2);border:2px solid var(--border);padding:12px 8px;text-align:center;}

/* ── FORMATION GRID ─────────────────────────────────────────── */
.formation-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:6px;
  margin-bottom:14px;
}
@media(min-width:480px){.formation-grid{grid-template-columns:repeat(7,1fr);}}

.day-slot{
  background:var(--panel2);border:2px solid var(--border);
  padding:8px 2px;text-align:center;cursor:pointer;
  transition:border-color 0.15s,background 0.15s;
  position:relative;
  min-height:72px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  -webkit-tap-highlight-color:transparent;
}
.day-slot:active{background:rgba(200,164,74,0.08);}
.day-slot.today{border-color:var(--gold);}
.day-slot.selected{background:rgba(74,188,170,0.12);border-color:var(--teal);}
.day-slot.has-split{background:rgba(200,164,74,0.06);}
.slot-day{font-family:'Press Start 2P',monospace;font-size:5px;color:var(--muted);}
.day-slot.today .slot-day{color:var(--gold);}
.slot-emoji{font-size:20px;line-height:1;}
.slot-name{font-family:'VT323',monospace;font-size:12px;color:var(--muted);}

/* ── CLASS PICKER ───────────────────────────────────────────── */
.class-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px;}
.class-chip{
  background:var(--panel2);border:2px solid var(--border2);
  padding:10px 12px;cursor:pointer;
  transition:all 0.1s;
  display:flex;align-items:center;gap:6px;
  font-family:'VT323',monospace;font-size:18px;color:var(--text);
  min-height:44px;
  -webkit-tap-highlight-color:transparent;
}
.class-chip:active{border-color:var(--gold);color:var(--gold2);}
.class-chip.active{border-color:var(--teal);background:rgba(74,188,170,0.1);color:var(--teal);}
@media(hover:hover){
  .class-chip:hover{border-color:var(--gold);color:var(--gold2);}
}

/* ── BUTTONS ────────────────────────────────────────────────── */
.btn{
  font-family:'Press Start 2P',monospace;
  font-size:clamp(7px,2vw,9px);
  padding:13px 16px;
  border:2px solid;
  cursor:pointer;
  letter-spacing:0.5px;
  transition:all 0.1s;
  display:inline-flex;align-items:center;gap:6px;
  background:transparent;
  min-height:44px;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
.btn:active{transform:translateY(1px);opacity:0.85;}
@media(hover:hover){.btn:hover{transform:translateY(-1px);}}
.btn-gold{border-color:var(--gold);color:var(--gold);}
@media(hover:hover){.btn-gold:hover{background:rgba(200,164,74,0.15);}}
.btn-teal{border-color:var(--teal);color:var(--teal);}
@media(hover:hover){.btn-teal:hover{background:rgba(74,188,170,0.12);}}
.btn-coral{border-color:var(--coral);color:var(--coral);}
@media(hover:hover){.btn-coral:hover{background:rgba(212,96,74,0.12);}}
.btn-muted{border-color:var(--border2);color:var(--muted);}
@media(hover:hover){.btn-muted:hover{border-color:var(--text);color:var(--text);}}
.btn-sm{font-size:clamp(6px,1.6vw,7px);padding:10px 12px;}
.btn-block{width:100%;justify-content:center;}

/* ── ENCOUNTER BLOCK ────────────────────────────────────────── */
.encounter{
  background:var(--panel2);
  border:2px solid var(--border);
  border-left:4px solid var(--coral);
  padding:12px 12px 12px 14px;
  margin-bottom:10px;
}
.encounter-header{
  display:flex;align-items:center;gap:8px;
  margin-bottom:10px;flex-wrap:nowrap;
}
.encounter-num{
  font-family:'Press Start 2P',monospace;font-size:7px;
  color:var(--coral);flex-shrink:0;
}
.encounter-input{
  flex:1;min-width:0;
  background:var(--bg);
  border:none;border-bottom:2px solid var(--gold);
  color:var(--gold2);
  font-family:'VT323',monospace;font-size:clamp(18px,5vw,22px);
  padding:8px 8px 6px;outline:none;
  width:100%;
}
.encounter-input::placeholder{color:var(--muted);}
.encounter-input:focus{border-bottom-color:var(--teal);color:var(--text);}

/* ── SETS TABLE ─────────────────────────────────────────────── */
.sets-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;margin-bottom:8px;}
.rounds-table{border-collapse:collapse;min-width:280px;width:100%;}
.rounds-table th{
  font-family:'Press Start 2P',monospace;font-size:6px;color:var(--muted);
  text-align:left;padding:6px 6px;border-bottom:1px solid var(--border);
  letter-spacing:0.5px;white-space:nowrap;
}
.rounds-table td{padding:3px 3px;}
.round-num{
  font-family:'Press Start 2P',monospace;font-size:6px;
  color:var(--border2);text-align:center;
  padding-right:4px;white-space:nowrap;
}
.round-input{
  width:72px;
  background:var(--bg);
  border:1px solid var(--border);border-bottom:2px solid var(--border2);
  color:var(--teal);
  font-family:'VT323',monospace;font-size:22px;
  padding:6px 6px;text-align:center;outline:none;
  transition:border-color 0.1s;
  -webkit-appearance:none;
  touch-action:manipulation;
}
.round-input:focus{border-bottom-color:var(--teal);}
.round-del{
  background:transparent;border:1px solid var(--border);
  color:var(--muted);font-family:'VT323',monospace;font-size:18px;
  padding:6px 10px;cursor:pointer;transition:all 0.1s;
  min-width:36px;min-height:36px;
  display:flex;align-items:center;justify-content:center;
}
.round-del:active{border-color:var(--coral);color:var(--coral);}

/* ── INPUTS ─────────────────────────────────────────────────── */
.vt-input{
  background:var(--bg);
  border:1px solid var(--border);border-bottom:2px solid var(--border2);
  color:var(--text);font-family:'VT323',monospace;font-size:20px;
  padding:10px 12px;outline:none;width:100%;
  -webkit-appearance:none;
}
.vt-input:focus{border-bottom-color:var(--gold);}
.vt-input::placeholder{color:var(--muted);}
.vt-textarea{
  background:var(--bg);
  border:1px solid var(--border);border-bottom:2px solid var(--border2);
  color:var(--text);font-family:'VT323',monospace;font-size:18px;
  padding:10px 12px;outline:none;width:100%;
  resize:vertical;min-height:72px;
  -webkit-appearance:none;
}
.vt-textarea:focus{border-bottom-color:var(--gold);}
input[type=date].vt-input{color-scheme:dark;}

/* ── QUEST LOG ──────────────────────────────────────────────── */
.quest-entry{margin-bottom:18px;}
.quest-header{
  display:flex;align-items:center;justify-content:space-between;
  background:var(--panel2);border:2px solid var(--border);border-bottom:none;
  padding:10px 12px;flex-wrap:wrap;gap:8px;
}
.quest-date-text{font-family:'Press Start 2P',monospace;font-size:clamp(6px,1.8vw,8px);color:var(--gold);}
.quest-body{border:2px solid var(--border);padding:10px 12px;background:var(--panel);}
.quest-exercise{padding:6px 8px;border-left:3px solid var(--border2);margin-bottom:6px;}
.quest-exercise:last-child{margin-bottom:0;}
.quest-ex-name{font-family:'VT323',monospace;font-size:clamp(18px,5vw,22px);color:var(--gold2);margin-bottom:4px;}
.quest-sets{display:flex;flex-wrap:wrap;gap:5px;}
.set-tag{
  background:var(--panel2);border:1px solid var(--border2);
  padding:3px 8px;font-family:'VT323',monospace;font-size:15px;color:var(--teal);
}
.quest-note{
  background:rgba(200,164,74,0.05);border-left:3px solid var(--gold);
  padding:8px 10px;margin-top:8px;
  font-family:'VT323',monospace;font-size:17px;color:var(--muted);
}

/* ── MISC ───────────────────────────────────────────────────── */
.split-badge{
  background:var(--panel2);border:1px solid var(--border2);
  padding:4px 10px;font-family:'VT323',monospace;font-size:16px;
  color:var(--teal);display:inline-flex;align-items:center;gap:5px;
}
.del-btn{
  background:transparent;border:1px solid var(--border2);
  color:var(--muted);font-family:'VT323',monospace;font-size:16px;
  padding:6px 10px;cursor:pointer;transition:all 0.1s;
  min-height:36px;display:inline-flex;align-items:center;
}
.del-btn:active{border-color:var(--coral);color:var(--coral);}
@media(hover:hover){.del-btn:hover{border-color:var(--coral);color:var(--coral);}}

.toast{
  position:fixed;
  left:50%;transform:translateX(-50%);
  bottom:calc(var(--nav-h) + var(--safe-bot) + 12px);
  background:var(--panel);border:2px solid var(--teal);
  padding:12px 18px;
  font-family:'Press Start 2P',monospace;font-size:clamp(6px,1.8vw,8px);
  color:var(--teal);z-index:9999;
  animation:toastIn 0.25s ease;
  width:calc(100% - 32px);max-width:340px;
  line-height:1.7;text-align:center;
}
.toast::before{content:'';position:absolute;inset:3px;border:1px solid rgba(74,188,170,0.2);pointer-events:none;}
@media(min-width:640px){.toast{bottom:20px;}}
@keyframes toastIn{from{transform:translateX(-50%) translateY(20px);opacity:0;}to{transform:translateX(-50%) translateY(0);opacity:1;}}

.empty{text-align:center;padding:40px 20px;color:var(--muted);font-family:'VT323',monospace;font-size:20px;}
.empty-icon{font-size:44px;display:block;margin-bottom:14px;}

.row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.row-sb{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;}
.divider{border:none;border-top:1px solid var(--border);margin:14px 0;}
.gap-top{margin-top:8px;}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback } = React;

const QUOTES=[

const DAYS=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
const DAY_FULL={Mon:"Monday",Tue:"Tuesday",Wed:"Wednesday",Thu:"Thursday",Fri:"Friday",Sat:"Saturday",Sun:"Sunday"};

function getTodayKey(){return["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][new Date().getDay()];}
function getTodayISO(){return new Date().toISOString().split("T")[0];}
function getDayFromISO(iso){const d=new Date(iso+"T00:00:00");return["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][d.getDay()];}
function fmtDate(iso){
  const d=new Date(iso+"T00:00:00");
  return d.toLocaleDateString("en-AU",{weekday:"short",day:"2-digit",month:"short",year:"numeric"});
}
function newEx(){return{id:Date.now()+Math.random(),name:"",sets:[{reps:"",weight:""}]};}
function computeStreak(wk){
  let s=0,d=new Date();d.setHours(0,0,0,0);
  for(let i=0;i<90;i++){
    const k=d.toISOString().split("T")[0];
    if(wk[k]?.exercises?.length>0)s++;else if(i>0)break;
    d.setDate(d.getDate()-1);
  }
  return s;
}
function computeLevel(n){return Math.max(1,Math.floor(n/3)+1);}

const RANKS=[
  {minLvl:1,  title:"COUCH COMMANDER",   icon:"🛋️"},
  {minLvl:2,  title:"GYM TOURIST",       icon:"🗺️"},
  {minLvl:3,  title:"PROTEIN PADAWAN",   icon:"🥛"},
  {minLvl:4,  title:"SWEATY APPRENTICE", icon:"💧"},
  {minLvl:5,  title:"IRON RECRUIT",      icon:"⚙️"},
  {minLvl:6,  title:"GAINZ GOBLIN",      icon:"👺"},
  {minLvl:7,  title:"BULK OPERATOR",     icon:"📦"},
  {minLvl:8,  title:"SWEAT MACHINE",     icon:"🤖"},
  {minLvl:9,  title:"REP REAPER",        icon:"💀"},
  {minLvl:10, title:"IRON ASCENDANT",    icon:"⚡"},
  {minLvl:12, title:"LEGENDARY UNIT",    icon:"👑"},
  {minLvl:15, title:"TRANSCENDED CHAD",  icon:"🌌"},
];
function getRank(level){
  let r=RANKS[0];
  for(const rank of RANKS){if(level>=rank.minLvl)r=rank;}
  return r;
}

/* TOAST */
function Toast({msg,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,2800);return()=>clearTimeout(t);},[]);
  return <div className="toast">▶ {msg}</div>;
}

/* ══════════════════ FORMATION ══════════════════ */
function SplitsTab({splits,setSplits,toast}){
  const [sel,setSel]=useState(null);
  const [customName,setCustomName]=useState("");
  const today=getTodayKey();

  const assign=(cls)=>{
    if(!sel)return;
    let val=cls;
    if(cls.id==="custom"){
      if(!customName.trim()){alert("Name your custom class!");return;}
      val={...cls,label:customName.trim().toUpperCase()};
    }
    setSplits(p=>({...p,[sel]:val}));
    toast(DAY_FULL[sel]+" → "+val.label);
    setSel(null);setCustomName("");
  };
  const clear=(d)=>{setSplits(p=>{const n={...p};delete n[d];return n;});toast("Day cleared.");};
  const selClass=sel?splits[sel]:null;

  return(
    <div className="page">
      <div className="section-title">PARTY FORMATION</div>
      <div style={{fontFamily:"'VT323',monospace",fontSize:"18px",color:"var(--muted)",marginBottom:14}}>
        Assign a battle class to each day. Tap a slot to change it.
      </div>

      <div className="formation-grid">
        {DAYS.map(d=>{
          const sp=splits[d],cl=sp?SPLIT_CLASSES.find(c=>c.id===sp.id)||sp:null,isToday=d===today;
          return(
            <div key={d}
              className={"day-slot"+(isToday?" today":"")+(sel===d?" selected":"")+(sp?" has-split":"")}
              onClick={()=>setSel(sel===d?null:d)}
            >
              <span className="slot-day">{d}{isToday?" ◄":""}</span>
              <span className="slot-emoji">{cl?cl.emoji:"+"}</span>
              <span className="slot-name">{cl?cl.label.split(" ")[0]:"tap"}</span>
            </div>
          );
        })}
      </div>

      {sel&&(
        <div className="panel panel-teal">
          <span className="px-label px-label-teal">ASSIGN CLASS → {(DAY_FULL[sel]||"").toUpperCase()}</span>
          <div className="class-list">
            {SPLIT_CLASSES.map(cls=>(
              <div key={cls.id}
                className={"class-chip"+(selClass?.id===cls.id?" active":"")}
                onClick={()=>cls.id!=="custom"?assign(cls):null}
                style={selClass?.id===cls.id?{borderColor:cls.color,color:cls.color}:{}}
              >
                <span style={{fontSize:"18px"}}>{cls.emoji}</span>
                <span>{cls.label}</span>
              </div>
            ))}
          </div>
          <div className="row" style={{marginTop:12}}>
            <input
              className="vt-input"
              style={{flex:1,minWidth:0}}
              placeholder="Custom class name..."
              value={customName}
              onChange={e=>setCustomName(e.target.value)}
            />
            <button className="btn btn-muted btn-sm" onClick={()=>assign(SPLIT_CLASSES.find(c=>c.id==="custom"))}>
              SET
            </button>
          </div>
          {selClass&&(
            <div style={{marginTop:12}}>
              <button className="btn btn-coral btn-sm" onClick={()=>clear(sel)}>✕ CLEAR DAY</button>
            </div>
          )}
        </div>
      )}

      <div className="section-title" style={{marginTop:8}}>FULL ROSTER</div>
      <div className="panel">
        {DAYS.map((d,i)=>{
          const sp=splits[d],cl=sp?SPLIT_CLASSES.find(c=>c.id===sp.id)||sp:null;
          return(
            <div key={d} style={{
              display:"flex",alignItems:"center",gap:10,
              padding:"11px 0",
              borderBottom:i<DAYS.length-1?"1px solid var(--border)":"none"
            }}>
              <span style={{fontFamily:"'Press Start 2P',monospace",fontSize:"6px",color:"var(--muted)",width:24,flexShrink:0}}>{d}</span>
              {cl?(
                <>
                  <span style={{fontSize:"18px",flexShrink:0}}>{cl.emoji}</span>
                  <span style={{fontFamily:"'VT323',monospace",fontSize:"20px",color:"var(--text)",flex:1,minWidth:0}}>{cl.label}</span>
                  <span style={{fontFamily:"'VT323',monospace",fontSize:"14px",color:"var(--muted)",flexShrink:0}}>{(cl.subtext||"").split(" ")[0]}</span>
                  <button className="del-btn" onClick={()=>clear(d)}>✕</button>
                </>
              ):(
                <span style={{fontFamily:"'VT323',monospace",fontSize:"17px",color:"var(--border2)",flex:1}}>— REST / UNASSIGNED</span>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ══════════════════ BATTLE LOG ══════════════════ */
function LogTab({workouts,setWorkouts,splits,toast}){
  const [date,setDate]=useState(getTodayISO());
  const [exercises,setExercises]=useState(()=>{
    const ex=workouts[getTodayISO()]?.exercises;
    return ex?.length?ex:[newEx()];
  });
  const [notes,setNotes]=useState(()=>workouts[getTodayISO()]?.notes||"");
  const [saved,setSaved]=useState(false);

  useEffect(()=>{
    const w=workouts[date];
    setExercises(w?.exercises?.length?w.exercises:[newEx()]);
    setNotes(w?.notes||"");
    setSaved(false);
  },[date]);

  const dayKey=getDayFromISO(date);
  const split=splits[dayKey];
  const splitClass=split?SPLIT_CLASSES.find(c=>c.id===split.id)||split:null;

  const updName=(id,name)=>setExercises(p=>p.map(e=>e.id===id?{...e,name}:e));
  const addSet=(id)=>setExercises(p=>p.map(e=>e.id===id?{...e,sets:[...e.sets,{reps:"",weight:""}]}:e));
  const remSet=(id,i)=>setExercises(p=>p.map(e=>e.id===id?{...e,sets:e.sets.filter((_,si)=>si!==i)}:e));
  const updSet=(id,i,f,v)=>setExercises(p=>p.map(e=>e.id===id?{...e,sets:e.sets.map((s,si)=>si===i?{...s,[f]:v}:s)}:e));
  const addEx=()=>setExercises(p=>[...p,newEx()]);
  const remEx=(id)=>setExercises(p=>p.filter(e=>e.id!==id));

  const save=()=>{
    const valid=exercises.filter(e=>e.name.trim());
    setWorkouts(p=>({...p,[date]:{split:split||null,exercises:valid,notes,savedAt:new Date().toISOString()}}));
    setSaved(true);toast("QUEST LOGGED. GLORY ACHIEVED.");
  };

  return(
    <div className="page">
      <div className="section-title">BATTLE LOG</div>

      <div className="panel" style={{marginBottom:14}}>
        <div style={{display:"flex",gap:14,flexWrap:"wrap",alignItems:"flex-end"}}>
          <div style={{flex:"1 1 160px",minWidth:0}}>
            <span className="px-label">DATE</span>
            <input type="date" className="vt-input"
              value={date} onChange={e=>{setDate(e.target.value);setSaved(false);}}/>
          </div>
          {splitClass&&(
            <div style={{flex:"1 1 120px",minWidth:0}}>
              <span className="px-label">TODAY'S CLASS</span>
              <div style={{
                fontFamily:"'VT323',monospace",fontSize:"clamp(20px,5vw,24px)",
                color:"var(--gold2)",display:"flex",alignItems:"center",gap:8
              }}>
                <span>{splitClass.emoji}</span>
                <span>{splitClass.label}</span>
              </div>
            </div>
          )}
        </div>
      </div>

      <div className="section-title">ENCOUNTERS</div>

      {exercises.map((ex,ei)=>(
        <div key={ex.id} className="encounter">
          <div className="encounter-header">
            <span className="encounter-num">#{ei+1}</span>
            <input
              className="encounter-input"
              placeholder="Exercise name..."
              value={ex.name}
              onChange={e=>updName(ex.id,e.target.value)}
              autoComplete="off"
            />
            <button className="del-btn" onClick={()=>remEx(ex.id)} style={{flexShrink:0}}>✕</button>
          </div>

          <div className="sets-scroll">
            <table className="rounds-table">
              <thead>
                <tr>
                  <th style={{width:24}}>RD</th>
                  <th style={{width:80}}>REPS</th>
                  <th style={{width:80}}>WEIGHT</th>
                  <th style={{width:36}}></th>
                </tr>
              </thead>
              <tbody>
                {ex.sets.map((s,si)=>(
                  <tr key={si}>
                    <td className="round-num">{si+1}</td>
                    <td>
                      <input className="round-input" type="number"
                        min="0" inputMode="numeric" placeholder="12"
                        value={s.reps} onChange={e=>updSet(ex.id,si,"reps",e.target.value)}/>
                    </td>
                    <td>
                      <input className="round-input" type="number"
                        min="0" step="0.5" inputMode="decimal" placeholder="60"
                        value={s.weight} onChange={e=>updSet(ex.id,si,"weight",e.target.value)}/>
                    </td>
                    <td>
                      {ex.sets.length>1&&(
                        <button className="round-del" onClick={()=>remSet(ex.id,si)}>✕</button>
                      )}
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>

          <button className="btn btn-muted btn-sm gap-top" onClick={()=>addSet(ex.id)}>
            + ADD ROUND
          </button>
        </div>
      ))}

      <div className="row" style={{marginBottom:18}}>
        <button className="btn btn-teal" onClick={addEx}>+ ADD ENCOUNTER</button>
        <button className="btn btn-muted btn-sm" onClick={()=>setExercises([newEx()])}>↺ RESET</button>
      </div>

      <hr className="divider"/>

      <div style={{marginBottom:16}}>
        <span className="px-label">
          BATTLE NOTES <span style={{opacity:0.45}}>(optional)</span>
        </span>
        <textarea
          className="vt-textarea"
          placeholder="New PR? Near death? Blame the pre-workout..."
          value={notes}
          onChange={e=>setNotes(e.target.value)}
        />
      </div>

      <button
        className="btn btn-gold btn-block"
        style={{padding:"16px",fontSize:"clamp(7px,2vw,10px)"}}
        onClick={save}
      >
        {saved?"✓ QUEST SAVED — LEGEND":"▶ SAVE QUEST"}
      </button>

      {exercises.filter(e=>!e.name.trim()).length>0&&(
        <div style={{
          fontFamily:"'VT323',monospace",fontSize:"16px",
          color:"var(--muted)",textAlign:"center",marginTop:8
        }}>
          ⚠ unnamed encounters won't be saved
        </div>
      )}
    </div>
  );
}

/* ══════════════════ QUEST ARCHIVE ══════════════════ */
function HistoryTab({workouts,setWorkouts,toast}){
  const sorted=Object.keys(workouts).filter(d=>workouts[d]?.exercises?.length>0).sort().reverse();

  const del=(date)=>{
    if(!window.confirm("Delete quest from "+fmtDate(date)+"?"))return;
    setWorkouts(p=>{const n={...p};delete n[date];return n;});
    toast("Quest erased from the scrolls.");
  };

  if(!sorted.length)return(
    <div className="page">
      <div className="section-title">QUEST ARCHIVE</div>
      <div className="empty">
        <span className="empty-icon">📜</span>
        The scrolls are empty, warrior.<br/>
        <span style={{fontSize:"16px",color:"#5a5a80"}}>Log your first battle to begin.</span>
      </div>
    </div>
  );

  return(
    <div className="page">
      <div className="section-title">QUEST ARCHIVE</div>
      <div style={{fontFamily:"'VT323',monospace",fontSize:"18px",color:"var(--muted)",marginBottom:16}}>
        {sorted.length} quest{sorted.length!==1?"s":""} in the scrolls ▮
      </div>

      {sorted.map(date=>{
        const w=workouts[date];
        const sc=w.split?SPLIT_CLASSES.find(c=>c.id===w.split.id)||w.split:null;
        return(
          <div key={date} className="quest-entry">
            <div className="quest-header">
              <span className="quest-date-text">{fmtDate(date)}</span>
              <div className="row">
                {sc&&<span className="split-badge">{sc.emoji} {(sc.label||"").split(" ")[0]}</span>}
                <button className="del-btn" onClick={()=>del(date)}>✕</button>
              </div>
            </div>
            <div className="quest-body">
              {w.exercises.map((ex,i)=>(
                <div key={i} className="quest-exercise">
                  <div className="quest-ex-name">
                    <span style={{
                      fontFamily:"'Press Start 2P',monospace",fontSize:"6px",
                      color:"var(--coral)",marginRight:8
                    }}>#{i+1}</span>
                    {ex.name}
                  </div>
                  <div className="quest-sets">
                    {ex.sets.map((s,si)=>(
                      <span key={si} className="set-tag">
                        S{si+1}: {s.reps||"?"}rep{s.weight?" · "+s.weight+"kg":""}
                      </span>
                    ))}
                  </div>
                </div>
              ))}
              {w.notes&&<div className="quest-note">📝 {w.notes}</div>}
            </div>
          </div>
        );
      })}
    </div>
  );
}

/* ══════════════════ ROOT ══════════════════ */
const TABS=[
  {id:"home",    label:"GUIDE",    icon:"◆",  longLabel:"◆ FIELD GUIDE"},
  {id:"splits",  label:"FORM",     icon:"⚔",  longLabel:"⚔ FORMATION"},
  {id:"log",     label:"BATTLE",   icon:"⚡",  longLabel:"⚡ BATTLE LOG"},
  {id:"history", label:"ARCHIVE",  icon:"📜",  longLabel:"📜 QUEST ARCHIVE"},
];

function App(){
  const [tab,setTab]=useState("home");
  const [toast,setToast]=useState(null);

  const [splits,setSplitsState]=useState(()=>{
    try{return JSON.parse(localStorage.getItem("ic_splits")||"{}");}catch{return{};}
  });
  const [workouts,setWorkoutsState]=useState(()=>{
    try{return JSON.parse(localStorage.getItem("ic_workouts")||"{}");}catch{return{};}
  });

  const setSplits=useCallback(fn=>setSplitsState(p=>{
    const n=typeof fn==="function"?fn(p):fn;
    localStorage.setItem("ic_splits",JSON.stringify(n));return n;
  }),[]);
  const setWorkouts=useCallback(fn=>setWorkoutsState(p=>{
    const n=typeof fn==="function"?fn(p):fn;
    localStorage.setItem("ic_workouts",JSON.stringify(n));return n;
  }),[]);

  const totalWk=Object.keys(workouts).filter(d=>workouts[d]?.exercises?.length>0).length;
  const level=computeLevel(totalWk);
  const streak=computeStreak(workouts);
  const rank=getRank(level);

  return(
    <div>
      {/* HEADER */}
      <div className="app-header">
        <div className="app-title">
          SWEAT
          <span className="sub">.EXE</span>
        </div>
        <div className="header-right">
          {rank.icon} {rank.title}<br/>
          🔥 {streak}-DAY STREAK
        </div>
      </div>

      {/* TOP NAV — desktop only */}
      <div className="top-nav">
        {TABS.map(t=>(
          <button key={t.id}
            className={"tnav-item"+(tab===t.id?" active":"")}
            onClick={()=>setTab(t.id)}
          >
            {t.longLabel}
          </button>
        ))}
      </div>

      {/* PAGE CONTENT */}
      {tab==="home"    &&<HomeTab    workouts={workouts} splits={splits} setTab={setTab}/>}
      {tab==="splits"  &&<SplitsTab  splits={splits}  setSplits={setSplits}   toast={msg=>setToast(msg)}/>}
      {tab==="log"     &&<LogTab     workouts={workouts} setWorkouts={setWorkouts} splits={splits} toast={msg=>setToast(msg)}/>}
      {tab==="history" &&<HistoryTab workouts={workouts} setWorkouts={setWorkouts} toast={msg=>setToast(msg)}/>}

      {/* FOOTER — desktop only */}
      <div style={{
        textAlign:"center",padding:"24px 20px 40px",
        fontFamily:"'Press Start 2P',monospace",fontSize:"7px",
        color:"var(--border2)",lineHeight:2.5
      }} className="top-nav">
        SWEAT.EXE v3.0<br/>
        <span style={{opacity:0.5}}>NO SKIPPING LEG DAY. THIS IS LAW.</span>
      </div>

      {/* BOTTOM NAV — mobile only */}
      <nav className="bottom-nav">
        {TABS.map(t=>(
          <button key={t.id}
            className={"bnav-item"+(tab===t.id?" active":"")}
            onClick={()=>setTab(t.id)}
          >
            <span className="bnav-icon">{t.icon}</span>
            <span className="bnav-label">{t.label}</span>
          </button>
        ))}
      </nav>

      {toast&&<Toast msg={toast} onClose={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
