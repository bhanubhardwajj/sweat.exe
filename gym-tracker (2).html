<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRON QUEST — Gym RPG Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0B0B18;--panel:#13132A;--panel2:#1A1A38;
  --border:#2E2E60;--border2:#4A4A90;
  --gold:#C8A44A;--gold2:#E8C878;
  --coral:#D4604A;--teal:#4ABCAA;--purple:#8870C8;
  --green:#50C870;--text:#CCC8F0;--muted:#7070A0;
}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'VT323',monospace;font-size:18px;min-height:100vh;overflow-x:hidden;}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.04) 3px,rgba(0,0,0,0.04) 4px);pointer-events:none;z-index:9000;}
.panel{background:var(--panel);border:2px solid var(--border);position:relative;padding:18px;margin-bottom:14px;}
.panel::before{content:'';position:absolute;inset:3px;border:1px solid var(--border2);pointer-events:none;opacity:0.4;}
.panel-gold{border-color:var(--gold);}
.panel-gold::before{border-color:var(--gold2);opacity:0.5;}
.panel-teal{border-color:var(--teal);}
.app-header{background:var(--panel);border-bottom:2px solid var(--gold);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;}
.app-title{font-family:'Press Start 2P',monospace;font-size:14px;color:var(--gold);letter-spacing:2px;text-shadow:0 0 20px rgba(200,164,74,0.5);}
.app-title span{color:var(--coral);}
.header-level{font-family:'Press Start 2P',monospace;font-size:9px;color:var(--teal);text-align:right;line-height:1.8;}
.nav{display:flex;background:var(--panel);border-bottom:2px solid var(--border);overflow-x:auto;scrollbar-width:none;}
.nav::-webkit-scrollbar{display:none;}
.nav-item{font-family:'Press Start 2P',monospace;font-size:8px;padding:14px 16px;color:var(--muted);cursor:pointer;border:none;background:transparent;white-space:nowrap;position:relative;transition:color 0.15s;letter-spacing:0.5px;}
.nav-item::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--gold);transform:scaleX(0);transition:transform 0.15s;}
.nav-item:hover{color:var(--text);}
.nav-item.active{color:var(--gold);}
.nav-item.active::after{transform:scaleX(1);}
.page{padding:20px 16px;max-width:860px;margin:0 auto;}
.px-label{font-family:'Press Start 2P',monospace;font-size:8px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;display:block;}
.px-label-gold{color:var(--gold);}
.px-label-teal{color:var(--teal);}
.px-label-coral{color:var(--coral);}
.big-stat{font-family:'VT323',monospace;font-size:42px;line-height:1;color:var(--gold2);}
.big-stat.teal{color:var(--teal);}
.big-stat.coral{color:var(--coral);}
.big-stat.green{color:var(--green);}
.big-stat.purple{color:var(--purple);}
.bar-wrap{width:100%;background:var(--bg);height:16px;border:1px solid var(--border2);position:relative;overflow:hidden;}
.bar-fill{height:100%;transition:width 0.6s ease;position:relative;}
.bar-fill::after{content:'';position:absolute;top:2px;left:2px;right:2px;height:4px;background:rgba(255,255,255,0.15);}
.bar-hp{background:linear-gradient(90deg,#A02828,var(--coral));}
.bar-exp{background:linear-gradient(90deg,#204880,var(--teal));}
.bar-str{background:linear-gradient(90deg,#402080,var(--purple));}
.stat-row{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
.stat-row .stat-name{font-family:'Press Start 2P',monospace;font-size:8px;color:var(--muted);width:34px;flex-shrink:0;}
.stat-row .stat-val{font-family:'VT323',monospace;font-size:22px;color:var(--text);width:40px;text-align:right;flex-shrink:0;}
.stat-row .bar-wrap{flex:1;}
.char-grid{display:grid;grid-template-columns:auto 1fr;gap:16px;align-items:start;}
@media(max-width:500px){.char-grid{grid-template-columns:1fr;}}
.char-avatar{width:100px;height:100px;background:var(--panel2);border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:52px;flex-shrink:0;position:relative;}
.char-avatar::after{content:'';position:absolute;inset:4px;border:1px solid var(--border);pointer-events:none;}
.level-badge{position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);background:var(--gold);color:var(--bg);font-family:'Press Start 2P',monospace;font-size:7px;padding:3px 8px;white-space:nowrap;}
.mission-box{background:var(--panel2);border:2px solid var(--teal);padding:14px 16px;margin-bottom:14px;position:relative;}
.mission-box::before{content:'► ACTIVE MISSION';position:absolute;top:-9px;left:12px;background:var(--panel);padding:0 8px;font-family:'Press Start 2P',monospace;font-size:7px;color:var(--teal);}
.mission-name{font-family:'VT323',monospace;font-size:28px;color:var(--gold2);margin-bottom:4px;}
.mission-sub{font-family:'VT323',monospace;font-size:18px;color:var(--muted);}
.dialog-box{background:var(--panel);border:3px solid var(--gold);padding:16px 20px 16px 52px;position:relative;margin-bottom:20px;}
.dialog-box::before{content:'';position:absolute;top:3px;left:3px;right:3px;bottom:3px;border:1px solid rgba(200,164,74,0.2);pointer-events:none;}
.dialog-portrait{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:28px;line-height:1;}
.dialog-speaker{font-family:'Press Start 2P',monospace;font-size:7px;color:var(--gold);margin-bottom:8px;display:block;}
.dialog-text{font-family:'VT323',monospace;font-size:20px;color:var(--text);line-height:1.4;}
.blink{animation:blink 1s step-end infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}
.formation-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-bottom:16px;}
@media(max-width:480px){.formation-grid{grid-template-columns:repeat(4,1fr);}}
.day-slot{background:var(--panel2);border:2px solid var(--border);padding:10px 4px;text-align:center;cursor:pointer;transition:border-color 0.15s,background 0.15s;position:relative;}
.day-slot:hover{border-color:var(--border2);}
.day-slot.today{border-color:var(--gold);}
.day-slot.selected{background:rgba(74,188,170,0.12);border-color:var(--teal);}
.day-slot.has-split{background:rgba(200,164,74,0.07);}
.day-slot .slot-day{font-family:'Press Start 2P',monospace;font-size:6px;color:var(--muted);margin-bottom:8px;display:block;}
.day-slot.today .slot-day{color:var(--gold);}
.day-slot .slot-emoji{font-size:22px;display:block;margin:2px 0;}
.day-slot .slot-name{font-family:'VT323',monospace;font-size:13px;color:var(--muted);margin-top:2px;display:block;}
.class-list{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px;}
.class-chip{background:var(--panel2);border:2px solid var(--border2);padding:8px 12px;cursor:pointer;transition:all 0.1s;display:flex;align-items:center;gap:6px;font-family:'VT323',monospace;font-size:18px;color:var(--text);}
.class-chip:hover{border-color:var(--gold);color:var(--gold2);}
.class-chip.active{border-color:var(--teal);background:rgba(74,188,170,0.1);color:var(--teal);}
.btn{font-family:'Press Start 2P',monospace;font-size:9px;padding:12px 18px;border:2px solid;cursor:pointer;letter-spacing:0.5px;transition:all 0.1s;position:relative;display:inline-flex;align-items:center;gap:6px;background:transparent;}
.btn:hover{transform:translateY(-1px);}
.btn:active{transform:translateY(1px);}
.btn-gold{border-color:var(--gold);color:var(--gold);}
.btn-gold:hover{background:rgba(200,164,74,0.15);}
.btn-teal{border-color:var(--teal);color:var(--teal);}
.btn-teal:hover{background:rgba(74,188,170,0.12);}
.btn-coral{border-color:var(--coral);color:var(--coral);}
.btn-coral:hover{background:rgba(212,96,74,0.12);}
.btn-muted{border-color:var(--border2);color:var(--muted);}
.btn-muted:hover{border-color:var(--text);color:var(--text);}
.btn-sm{font-size:7px;padding:8px 12px;}
.encounter{background:var(--panel2);border:2px solid var(--border);border-left:4px solid var(--coral);padding:14px 14px 14px 16px;margin-bottom:12px;position:relative;}
.encounter:hover{border-left-color:var(--gold);}
.encounter-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap;}
.encounter-num{font-family:'Press Start 2P',monospace;font-size:8px;color:var(--coral);width:26px;flex-shrink:0;}
.encounter-input{flex:1;min-width:160px;background:var(--bg);border:1px solid var(--border2);border-bottom:2px solid var(--gold);color:var(--gold2);font-family:'VT323',monospace;font-size:22px;padding:8px 12px;outline:none;}
.encounter-input::placeholder{color:var(--muted);}
.encounter-input:focus{border-bottom-color:var(--teal);color:var(--text);}
.rounds-table{width:100%;border-collapse:collapse;}
.rounds-table th{font-family:'Press Start 2P',monospace;font-size:7px;color:var(--muted);text-align:left;padding:6px 8px;border-bottom:1px solid var(--border);letter-spacing:0.5px;}
.rounds-table td{padding:4px 4px;}
.round-num{font-family:'Press Start 2P',monospace;font-size:7px;color:var(--border2);text-align:center;width:28px;}
.round-input{width:80px;background:var(--bg);border:1px solid var(--border);border-bottom:2px solid var(--border2);color:var(--teal);font-family:'VT323',monospace;font-size:22px;padding:6px 8px;text-align:center;outline:none;transition:border-color 0.1s;}
.round-input:focus{border-bottom-color:var(--teal);}
.round-del{background:transparent;border:1px solid var(--border);color:var(--muted);font-family:'VT323',monospace;font-size:18px;padding:4px 8px;cursor:pointer;transition:all 0.1s;}
.round-del:hover{border-color:var(--coral);color:var(--coral);}
.vt-input{background:var(--bg);border:1px solid var(--border);border-bottom:2px solid var(--border2);color:var(--text);font-family:'VT323',monospace;font-size:20px;padding:8px 12px;outline:none;width:100%;}
.vt-input:focus{border-bottom-color:var(--gold);}
.vt-input::placeholder{color:var(--muted);}
.vt-textarea{background:var(--bg);border:1px solid var(--border);border-bottom:2px solid var(--border2);color:var(--text);font-family:'VT323',monospace;font-size:18px;padding:10px 12px;outline:none;width:100%;resize:vertical;min-height:70px;}
.vt-textarea:focus{border-bottom-color:var(--gold);}
.quest-entry{margin-bottom:20px;}
.quest-header{display:flex;align-items:center;justify-content:space-between;background:var(--panel2);border:2px solid var(--border);border-bottom:none;padding:10px 14px;flex-wrap:wrap;gap:8px;}
.quest-date-text{font-family:'Press Start 2P',monospace;font-size:8px;color:var(--gold);}
.quest-body{border:2px solid var(--border);padding:12px;background:var(--panel);}
.quest-exercise{padding:8px 10px;border-left:3px solid var(--border2);margin-bottom:8px;}
.quest-exercise:last-child{margin-bottom:0;}
.quest-ex-name{font-family:'VT323',monospace;font-size:22px;color:var(--gold2);margin-bottom:4px;}
.quest-sets{display:flex;flex-wrap:wrap;gap:6px;}
.set-tag{background:var(--panel2);border:1px solid var(--border2);padding:3px 10px;font-family:'VT323',monospace;font-size:16px;color:var(--teal);}
.quest-note{background:rgba(200,164,74,0.06);border-left:3px solid var(--gold);padding:8px 12px;margin-top:8px;font-family:'VT323',monospace;font-size:18px;color:var(--muted);}
.section-title{font-family:'Press Start 2P',monospace;font-size:10px;color:var(--gold);letter-spacing:2px;margin-bottom:14px;display:flex;align-items:center;gap:10px;}
.section-title::before{content:'◆';font-size:8px;color:var(--coral);}
.section-title::after{content:'';flex:1;height:1px;background:var(--border);}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:16px;}
.mini-stat{background:var(--panel2);border:2px solid var(--border);padding:12px 10px;text-align:center;}
.split-badge{background:var(--panel2);border:1px solid var(--border2);padding:4px 10px;font-family:'VT323',monospace;font-size:16px;color:var(--teal);display:inline-flex;align-items:center;gap:6px;}
.toast{position:fixed;bottom:20px;right:20px;background:var(--panel);border:2px solid var(--teal);padding:12px 18px;font-family:'Press Start 2P',monospace;font-size:8px;color:var(--teal);z-index:9999;animation:toastIn 0.25s ease;max-width:280px;line-height:1.6;}
.toast::before{content:'';position:absolute;inset:3px;border:1px solid rgba(74,188,170,0.2);pointer-events:none;}
@keyframes toastIn{from{transform:translateY(30px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.streak-banner{background:rgba(200,100,60,0.1);border:2px solid var(--coral);padding:12px 16px;margin-bottom:14px;display:flex;align-items:center;gap:12px;}
.streak-fire{font-size:26px;animation:pulse 1s ease-in-out infinite alternate;}
@keyframes pulse{from{transform:scale(1);}to{transform:scale(1.15);}}
.streak-text{font-family:'Press Start 2P',monospace;font-size:8px;color:var(--coral);line-height:2;}
.empty{text-align:center;padding:48px 24px;color:var(--muted);font-family:'VT323',monospace;font-size:20px;}
.empty-icon{font-size:48px;display:block;margin-bottom:14px;}
.del-btn{background:transparent;border:1px solid var(--border2);color:var(--muted);font-family:'VT323',monospace;font-size:16px;padding:4px 10px;cursor:pointer;transition:all 0.1s;}
.del-btn:hover{border-color:var(--coral);color:var(--coral);}
.row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.row-sb{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;}
.divider{border:none;border-top:1px solid var(--border);margin:16px 0;}
input[type=date].vt-input{color-scheme:dark;}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback } = React;

const QUOTES=[
  {speaker:"GYM SAGE",text:"The iron never lies. Unlike your bathroom scale.",portrait:"🧙"},
  {speaker:"DARK LORD LEG DAY",text:"You skipped me again. The quad seeks vengeance. You will waddle.",portrait:"👿"},
  {speaker:"ANCIENT PROVERB",text:"Pain is just weakness leaving the body. Lots of weakness in there.",portrait:"📜"},
  {speaker:"YOUR FUTURE SELF",text:"Hey. Start now. I will be waiting. Looking incredible.",portrait:"🪞"},
  {speaker:"BENCH PRESS GHOST",text:"Every empty bar was once someone's max. Touch grass. Lift iron.",portrait:"👻"},
  {speaker:"PROTEIN SHAKE ORACLE",text:"Two scoops for gains, and the crushing loneliness of not lifting.",portrait:"🔮"},
  {speaker:"THE DUMBBELLS",text:"We remember every time you cleaned us and never actually used us.",portrait:"🏋️"},
  {speaker:"CARDIO DEMON",text:"You have been 'about to start running' for 3 years. I'm still here.",portrait:"😈"},
  {speaker:"REST DAY SPIRIT",text:"Muscles grow while you sleep. So yes, napping counts. Not really.",portrait:"💤"},
  {speaker:"ANCIENT GYM BRO",text:"Form before ego. Unless no one is watching. Then ego before form.",portrait:"🦍"},
  {speaker:"SPOTTER OF DESTINY",text:"I got you. I always got you. You didn't need help. I just liked the view.",portrait:"🤝"},
  {speaker:"THE PRE-WORKOUT",text:"I will make you feel invincible. You will squat 60kg. This is fine.",portrait:"⚡"},
];

const SPLIT_CLASSES=[
  {id:"push",label:"PUSH",emoji:"🗡️",subtext:"Chest · Shoulder · Tri",color:"#C84850"},
  {id:"pull",label:"PULL",emoji:"🏹",subtext:"Back · Biceps",color:"#8870C8"},
  {id:"legs",label:"LEGS",emoji:"🦵",subtext:"Quad · Ham · Glute",color:"#4ABCAA"},
  {id:"chest",label:"CHEST",emoji:"🛡️",subtext:"Chest Focus",color:"#C8A44A"},
  {id:"back",label:"BACK",emoji:"🏔️",subtext:"Back · Rows",color:"#50A868"},
  {id:"shoulders",label:"SHOULDERS",emoji:"⚔️",subtext:"Deltoid · Traps",color:"#D4604A"},
  {id:"arms",label:"ARMS",emoji:"💪",subtext:"Bi · Tri · Forearm",color:"#8870C8"},
  {id:"core",label:"CORE",emoji:"🌀",subtext:"Abs · Obliques",color:"#4A8CC8"},
  {id:"cardio",label:"CARDIO",emoji:"🏃",subtext:"Endurance",color:"#50C870"},
  {id:"fullbody",label:"FULL BODY",emoji:"⚡",subtext:"Everything hurts",color:"#E8C878"},
  {id:"rest",label:"REST",emoji:"🛌",subtext:"Recover · Eat · Cry",color:"#7070A0"},
  {id:"custom",label:"CUSTOM",emoji:"✏️",subtext:"Your own path",color:"#A0A080"},
];

const DAYS=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
const DAY_FULL={Mon:"Monday",Tue:"Tuesday",Wed:"Wednesday",Thu:"Thursday",Fri:"Friday",Sat:"Saturday",Sun:"Sunday"};
function getTodayKey(){return["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][new Date().getDay()];}
function getTodayISO(){return new Date().toISOString().split("T")[0];}
function getDayFromISO(iso){const d=new Date(iso+"T00:00:00");return["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][d.getDay()];}
function fmtDate(iso){const d=new Date(iso+"T00:00:00");return d.toLocaleDateString("en-AU",{weekday:"short",day:"2-digit",month:"short",year:"numeric"});}
function newEx(){return{id:Date.now()+Math.random(),name:"",sets:[{reps:"",weight:""}]};}
function computeStreak(wk){let s=0,d=new Date();d.setHours(0,0,0,0);for(let i=0;i<90;i++){const k=d.toISOString().split("T")[0];if(wk[k]?.exercises?.length>0)s++;else if(i>0)break;d.setDate(d.getDate()-1);}return s;}
function computeLevel(total){return Math.max(1,Math.floor(total/3)+1);}

function Toast({msg,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,2600);return()=>clearTimeout(t);},[]);
  return <div className="toast">▶ {msg}</div>;
}

/* HOME */
function HomeTab({workouts,splits,setTab}){
  const [quote]=useState(()=>QUOTES[Math.floor(Math.random()*QUOTES.length)]);
  const today=getTodayKey(),todayISO=getTodayISO();
  const todaySplit=splits[today]||null;
  const todayClass=todaySplit?SPLIT_CLASSES.find(c=>c.id===todaySplit.id)||todaySplit:null;
  const totalWk=Object.keys(workouts).filter(d=>workouts[d]?.exercises?.length>0).length;
  const streak=computeStreak(workouts);
  const level=computeLevel(totalWk);
  const totalEx=Object.values(workouts).reduce((s,w)=>s+(w?.exercises?.length||0),0);
  const totalSets=Object.values(workouts).reduce((s,w)=>s+(w?.exercises||[]).reduce((a,e)=>a+(e?.sets?.length||0),0),0);
  const todayDone=workouts[todayISO]?.exercises?.length>0;
  const strBar=Math.min(100,(totalSets/500)*100);
  const endBar=Math.min(100,(totalEx/200)*100);
  const expBar=Math.min(100,((totalWk%3)/3)*100);
  const hpBar=todayDone?100:todaySplit?30:15;

  return(
    <div className="page">
      <div className="dialog-box">
        <div className="dialog-portrait">{quote.portrait}</div>
        <span className="dialog-speaker">{quote.speaker}</span>
        <div className="dialog-text">{quote.text}<span className="blink"> ▮</span></div>
      </div>

      {streak>=2&&(
        <div className="streak-banner">
          <span className="streak-fire">🔥</span>
          <div className="streak-text">{streak}-DAY COMBO STREAK ACTIVE<br/><span style={{color:"var(--muted)"}}>the iron gods are pleased</span></div>
        </div>
      )}

      <div className="section-title">CHARACTER STATUS</div>
      <div className="panel panel-gold" style={{marginBottom:14}}>
        <div className="char-grid">
          <div style={{position:"relative"}}>
            <div className="char-avatar">
              {todayDone?"💪":todaySplit?"⚔️":"😴"}
              <div className="level-badge">LVL {level}</div>
            </div>
          </div>
          <div>
            <span className="px-label px-label-gold" style={{marginBottom:2}}>IRON WARRIOR</span>
            <div style={{fontFamily:"'VT323',monospace",fontSize:"26px",color:"var(--gold2)",marginBottom:12}}>
              {todayDone?"BATTLE COMPLETE":todaySplit?"QUEST AWAITS":"IN THE TAVERN"}
            </div>
            <div className="stat-row">
              <span className="stat-name">HP</span>
              <span className="stat-val" style={{color:"var(--coral)"}}>{hpBar}</span>
              <div className="bar-wrap"><div className="bar-fill bar-hp" style={{width:hpBar+"%"}}></div></div>
            </div>
            <div className="stat-row">
              <span className="stat-name">EXP</span>
              <span className="stat-val" style={{color:"var(--teal)"}}>{Math.round(expBar)}</span>
              <div className="bar-wrap"><div className="bar-fill bar-exp" style={{width:expBar+"%"}}></div></div>
            </div>
            <div className="stat-row">
              <span className="stat-name">STR</span>
              <span className="stat-val" style={{color:"var(--purple)"}}>{Math.round(strBar)}</span>
              <div className="bar-wrap"><div className="bar-fill bar-str" style={{width:strBar+"%"}}></div></div>
            </div>
          </div>
        </div>
      </div>

      {todayClass?(
        <div className="mission-box">
          <div className="mission-name">{todayClass.emoji} {todayClass.label} DAY</div>
          <div className="mission-sub">{todayDone?"✓ COMPLETED — you absolute unit":`${todayClass.subtext||""} — awaiting battle log`}</div>
          {!todayDone&&<div style={{marginTop:12}}><button className="btn btn-teal btn-sm" onClick={()=>setTab("log")}>▶ LOG NOW</button></div>}
        </div>
      ):(
        <div className="panel" style={{marginBottom:14,borderStyle:"dashed"}}>
          <span className="px-label">NO MISSION ASSIGNED TODAY</span>
          <div style={{fontFamily:"'VT323',monospace",fontSize:"20px",color:"var(--muted)"}}>Head to FORMATION to plan your week</div>
          <div style={{marginTop:10}}><button className="btn btn-muted btn-sm" onClick={()=>setTab("splits")}>▶ OPEN FORMATION</button></div>
        </div>
      )}

      <div className="section-title">STATS</div>
      <div className="stats-grid" style={{marginBottom:16}}>
        {[{val:totalWk,label:"QUESTS DONE",cls:"coral"},{val:streak,label:"DAY STREAK",cls:"teal"},{val:totalEx,label:"ENCOUNTERS",cls:"purple"},{val:totalSets,label:"TOTAL ROUNDS",cls:"green"}].map(s=>(
          <div key={s.label} className="mini-stat">
            <div className={"big-stat "+s.cls}>{s.val}</div>
            <span className="px-label" style={{marginBottom:0,marginTop:4,fontSize:"7px"}}>{s.label}</span>
          </div>
        ))}
      </div>

      <div className="section-title">THIS WEEK'S FORMATION</div>
      <div className="formation-grid" style={{marginBottom:16}}>
        {DAYS.map(d=>{
          const sp=splits[d],cl=sp?SPLIT_CLASSES.find(c=>c.id===sp.id)||sp:null,isToday=d===today;
          return(
            <div key={d} className={"day-slot"+(isToday?" today":"")+(sp?" has-split":"")}>
              <span className="slot-day">{d}{isToday?"◄":""}</span>
              <span className="slot-emoji">{cl?cl.emoji:"—"}</span>
              <span className="slot-name" style={{fontSize:"11px"}}>{cl?cl.label.split(" ")[0]:"REST"}</span>
            </div>
          );
        })}
      </div>

      <div className="section-title">RECENT QUESTS</div>
      {Object.keys(workouts).filter(d=>workouts[d]?.exercises?.length>0).sort().reverse().slice(0,3).map(date=>(
        <div key={date} className="panel" style={{marginBottom:8,padding:"12px 14px"}}>
          <div className="row-sb">
            <div>
              <div style={{fontFamily:"'Press Start 2P',monospace",fontSize:"8px",color:"var(--gold)",marginBottom:4}}>{fmtDate(date)}</div>
              <div style={{fontFamily:"'VT323',monospace",fontSize:"18px",color:"var(--muted)"}}>{workouts[date].exercises.length} exercise{workouts[date].exercises.length!==1?"s":""} logged</div>
            </div>
            {workouts[date].split&&<span className="split-badge">{workouts[date].split.emoji} {(workouts[date].split.label||"").split(" ")[0]}</span>}
          </div>
        </div>
      ))}
      {Object.keys(workouts).filter(d=>workouts[d]?.exercises?.length>0).length===0&&(
        <div className="empty">
          <span className="empty-icon">🏰</span>
          No quests completed yet, warrior.<br/>
          <span style={{fontSize:"16px",color:"#5a5a80"}}>The dungeon awaits your first entry.</span>
          <div style={{marginTop:20}}><button className="btn btn-gold" onClick={()=>setTab("log")}>▶ BEGIN FIRST QUEST</button></div>
        </div>
      )}
    </div>
  );
}

/* FORMATION */
function SplitsTab({splits,setSplits,toast}){
  const [sel,setSel]=useState(null);
  const [customName,setCustomName]=useState("");
  const today=getTodayKey();
  const assign=(cls)=>{
    if(!sel) return;
    let val=cls;
    if(cls.id==="custom"){if(!customName.trim()){alert("Name your custom class!");return;}val={...cls,label:customName.trim().toUpperCase()};}
    setSplits(p=>({...p,[sel]:val}));
    toast(DAY_FULL[sel]+" → "+val.label);
    setSel(null);setCustomName("");
  };
  const clear=(d)=>{setSplits(p=>{const n={...p};delete n[d];return n;});toast("Slot cleared.");};
  const selClass=sel?splits[sel]:null;
  return(
    <div className="page">
      <div className="section-title">PARTY FORMATION</div>
      <div style={{fontFamily:"'VT323',monospace",fontSize:"18px",color:"var(--muted)",marginBottom:16}}>Assign a battle class to each day. Click a slot to edit it.</div>
      <div className="formation-grid">
        {DAYS.map(d=>{
          const sp=splits[d],cl=sp?SPLIT_CLASSES.find(c=>c.id===sp.id)||sp:null,isToday=d===today;
          return(
            <div key={d} className={"day-slot"+(isToday?" today":"")+(sel===d?" selected":"")+(sp?" has-split":"")} onClick={()=>setSel(sel===d?null:d)}>
              <span className="slot-day">{d}{isToday?" ◄":""}</span>
              <span className="slot-emoji">{cl?cl.emoji:"+"}</span>
              <span className="slot-name">{cl?cl.label.split(" ")[0]:"tap"}</span>
            </div>
          );
        })}
      </div>
      {sel&&(
        <div className="panel panel-teal" style={{marginTop:4}}>
          <span className="px-label px-label-teal">ASSIGN CLASS → {(DAY_FULL[sel]||"").toUpperCase()}</span>
          <div className="class-list">
            {SPLIT_CLASSES.map(cls=>(
              <div key={cls.id} className={"class-chip"+(selClass?.id===cls.id?" active":"")} onClick={()=>cls.id!=="custom"?assign(cls):null} style={selClass?.id===cls.id?{borderColor:cls.color,color:cls.color}:{}}>
                <span style={{fontSize:"20px"}}>{cls.emoji}</span><span>{cls.label}</span>
              </div>
            ))}
          </div>
          <div className="row" style={{marginTop:14}}>
            <input className="vt-input" style={{flex:1}} placeholder="Custom class name..." value={customName} onChange={e=>setCustomName(e.target.value)}/>
            <button className="btn btn-muted btn-sm" onClick={()=>assign(SPLIT_CLASSES.find(c=>c.id==="custom"))}>SET CUSTOM</button>
          </div>
          {selClass&&<div style={{marginTop:12}}><button className="btn btn-coral btn-sm" onClick={()=>clear(sel)}>✕ CLEAR DAY</button></div>}
        </div>
      )}
      <div className="section-title" style={{marginTop:8}}>FULL ROSTER</div>
      <div className="panel">
        {DAYS.map(d=>{
          const sp=splits[d],cl=sp?SPLIT_CLASSES.find(c=>c.id===sp.id)||sp:null;
          return(
            <div key={d} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 0",borderBottom:"1px solid var(--border)"}}>
              <span style={{fontFamily:"'Press Start 2P',monospace",fontSize:"7px",color:"var(--muted)",width:28}}>{d}</span>
              {cl?(<><span style={{fontSize:"18px"}}>{cl.emoji}</span><span style={{fontFamily:"'VT323',monospace",fontSize:"20px",color:"var(--text)",flex:1}}>{cl.label}</span><span style={{fontFamily:"'VT323',monospace",fontSize:"15px",color:"var(--muted)"}}>{cl.subtext||""}</span><button className="del-btn" onClick={()=>clear(d)}>✕</button></>)
              :(<span style={{fontFamily:"'VT323',monospace",fontSize:"18px",color:"var(--border2)",flex:1}}>— REST / UNASSIGNED</span>)}
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* BATTLE LOG */
function LogTab({workouts,setWorkouts,splits,toast}){
  const [date,setDate]=useState(getTodayISO());
  const [exercises,setExercises]=useState(()=>{const ex=workouts[getTodayISO()]?.exercises;return ex?.length?ex:[newEx()];});
  const [notes,setNotes]=useState(()=>workouts[getTodayISO()]?.notes||"");
  const [saved,setSaved]=useState(false);
  useEffect(()=>{const w=workouts[date];setExercises(w?.exercises?.length?w.exercises:[newEx()]);setNotes(w?.notes||"");setSaved(false);},[date]);
  const dayKey=getDayFromISO(date);
  const split=splits[dayKey];
  const splitClass=split?SPLIT_CLASSES.find(c=>c.id===split.id)||split:null;
  const updName=(id,name)=>setExercises(p=>p.map(e=>e.id===id?{...e,name}:e));
  const addSet=(id)=>setExercises(p=>p.map(e=>e.id===id?{...e,sets:[...e.sets,{reps:"",weight:""}]}:e));
  const remSet=(id,i)=>setExercises(p=>p.map(e=>e.id===id?{...e,sets:e.sets.filter((_,si)=>si!==i)}:e));
  const updSet=(id,i,f,v)=>setExercises(p=>p.map(e=>e.id===id?{...e,sets:e.sets.map((s,si)=>si===i?{...s,[f]:v}:s)}:e));
  const addEx=()=>setExercises(p=>[...p,newEx()]);
  const remEx=(id)=>setExercises(p=>p.filter(e=>e.id!==id));
  const save=()=>{
    const valid=exercises.filter(e=>e.name.trim());
    setWorkouts(p=>({...p,[date]:{split:split||null,exercises:valid,notes,savedAt:new Date().toISOString()}}));
    setSaved(true);toast("QUEST LOGGED. GLORY ACHIEVED.");
  };
  return(
    <div className="page">
      <div className="section-title">BATTLE LOG</div>
      <div className="panel" style={{marginBottom:14}}>
        <div className="row">
          <div>
            <span className="px-label">DATE</span>
            <input type="date" className="vt-input" style={{width:"auto"}} value={date} onChange={e=>{setDate(e.target.value);setSaved(false);}}/>
          </div>
          {splitClass&&(
            <div>
              <span className="px-label">TODAY'S CLASS</span>
              <div style={{fontFamily:"'VT323',monospace",fontSize:"24px",color:"var(--gold2)",display:"flex",alignItems:"center",gap:8}}>
                <span>{splitClass.emoji}</span><span>{splitClass.label}</span>
              </div>
            </div>
          )}
        </div>
      </div>
      <div className="section-title">ENCOUNTERS</div>
      {exercises.map((ex,ei)=>(
        <div key={ex.id} className="encounter">
          <div className="encounter-header">
            <span className="encounter-num">#{ei+1}</span>
            <input className="encounter-input" placeholder="Exercise name..." value={ex.name} onChange={e=>updName(ex.id,e.target.value)}/>
            <button className="del-btn" onClick={()=>remEx(ex.id)}>✕ REMOVE</button>
          </div>
          <table className="rounds-table">
            <thead><tr><th style={{width:28}}>RD</th><th>REPS</th><th>WEIGHT KG</th><th style={{width:48}}></th></tr></thead>
            <tbody>
              {ex.sets.map((s,si)=>(
                <tr key={si}>
                  <td className="round-num">{si+1}</td>
                  <td><input className="round-input" type="number" min="0" placeholder="12" value={s.reps} onChange={e=>updSet(ex.id,si,"reps",e.target.value)}/></td>
                  <td><input className="round-input" type="number" min="0" step="0.5" placeholder="60" value={s.weight} onChange={e=>updSet(ex.id,si,"weight",e.target.value)}/></td>
                  <td>{ex.sets.length>1&&<button className="round-del" onClick={()=>remSet(ex.id,si)}>✕</button>}</td>
                </tr>
              ))}
            </tbody>
          </table>
          <div style={{marginTop:10}}><button className="btn btn-muted btn-sm" onClick={()=>addSet(ex.id)}>+ ADD ROUND</button></div>
        </div>
      ))}
      <div className="row" style={{marginBottom:20}}>
        <button className="btn btn-teal" onClick={addEx}>+ ADD ENCOUNTER</button>
        <button className="btn btn-muted btn-sm" onClick={()=>setExercises([newEx()])}>↺ RESET</button>
      </div>
      <hr className="divider"/>
      <div style={{marginBottom:18}}>
        <span className="px-label">BATTLE NOTES <span style={{opacity:0.5}}>(optional)</span></span>
        <textarea className="vt-textarea" placeholder="How did it go? New PR? Near death experience? Blame the pre-workout..." value={notes} onChange={e=>setNotes(e.target.value)}/>
      </div>
      <button className="btn btn-gold" style={{width:"100%",justifyContent:"center",padding:"16px",fontSize:"10px"}} onClick={save}>
        {saved?"✓ QUEST SAVED — YOU ARE LEGEND":"▶ SAVE QUEST"}
      </button>
      {exercises.filter(e=>!e.name.trim()).length>0&&(
        <div style={{fontFamily:"'VT323',monospace",fontSize:"16px",color:"var(--muted)",textAlign:"center",marginTop:8}}>⚠ unnamed encounters will not be saved</div>
      )}
    </div>
  );
}

/* QUEST ARCHIVE */
function HistoryTab({workouts,setWorkouts,toast}){
  const sorted=Object.keys(workouts).filter(d=>workouts[d]?.exercises?.length>0).sort().reverse();
  const del=(date)=>{
    if(!window.confirm("Delete quest from "+fmtDate(date)+"?")) return;
    setWorkouts(p=>{const n={...p};delete n[date];return n;});
    toast("Quest erased from the scrolls.");
  };
  if(!sorted.length) return(
    <div className="page">
      <div className="section-title">QUEST ARCHIVE</div>
      <div className="empty"><span className="empty-icon">📜</span>The scrolls are empty, warrior.<br/><span style={{fontSize:"16px",color:"#5a5a80"}}>Log your first battle to begin the legend.</span></div>
    </div>
  );
  return(
    <div className="page">
      <div className="section-title">QUEST ARCHIVE</div>
      <div style={{fontFamily:"'VT323',monospace",fontSize:"18px",color:"var(--muted)",marginBottom:20}}>{sorted.length} quest{sorted.length!==1?"s":""} in the scrolls ▮</div>
      {sorted.map(date=>{
        const w=workouts[date],sc=w.split?SPLIT_CLASSES.find(c=>c.id===w.split.id)||w.split:null;
        return(
          <div key={date} className="quest-entry">
            <div className="quest-header">
              <span className="quest-date-text">{fmtDate(date)}</span>
              <div className="row">
                {sc&&<span className="split-badge">{sc.emoji} {(sc.label||"").split(" ")[0]}</span>}
                <button className="del-btn" onClick={()=>del(date)}>✕ DELETE</button>
              </div>
            </div>
            <div className="quest-body">
              {w.exercises.map((ex,i)=>(
                <div key={i} className="quest-exercise">
                  <div className="quest-ex-name"><span style={{fontFamily:"'Press Start 2P',monospace",fontSize:"7px",color:"var(--coral)",marginRight:8}}>#{i+1}</span>{ex.name}</div>
                  <div className="quest-sets">{ex.sets.map((s,si)=>(
                    <span key={si} className="set-tag">S{si+1}: {s.reps?s.reps:"?"}rep{s.weight?" · "+s.weight+"kg":""}</span>
                  ))}</div>
                </div>
              ))}
              {w.notes&&<div className="quest-note">📝 {w.notes}</div>}
            </div>
          </div>
        );
      })}
    </div>
  );
}

/* ROOT */
function App(){
  const [tab,setTab]=useState("home");
  const [toast,setToast]=useState(null);
  const [splits,setSplitsState]=useState(()=>{try{return JSON.parse(localStorage.getItem("iq_splits")||"{}");}catch{return{};}});
  const [workouts,setWorkoutsState]=useState(()=>{try{return JSON.parse(localStorage.getItem("iq_workouts")||"{}");}catch{return{};}});
  const setSplits=useCallback(fn=>setSplitsState(p=>{const n=typeof fn==="function"?fn(p):fn;localStorage.setItem("iq_splits",JSON.stringify(n));return n;}),[]);
  const setWorkouts=useCallback(fn=>setWorkoutsState(p=>{const n=typeof fn==="function"?fn(p):fn;localStorage.setItem("iq_workouts",JSON.stringify(n));return n;}),[]);
  const totalWk=Object.keys(workouts).filter(d=>workouts[d]?.exercises?.length>0).length;
  const level=computeLevel(totalWk);
  const streak=computeStreak(workouts);
  const TABS=[{id:"home",label:"◆ FIELD GUIDE"},{id:"splits",label:"⚔ FORMATION"},{id:"log",label:"⚡ BATTLE LOG"},{id:"history",label:"📜 QUEST ARCHIVE"}];
  return(
    <div>
      <div className="app-header">
        <div className="app-title">IRON <span>QUEST</span></div>
        <div className="header-level">LVL {level} WARRIOR<br/>🔥 {streak} DAY STREAK</div>
      </div>
      <div className="nav">
        {TABS.map(t=><button key={t.id} className={"nav-item"+(tab===t.id?" active":"")} onClick={()=>setTab(t.id)}>{t.label}</button>)}
      </div>
      {tab==="home"&&<HomeTab workouts={workouts} splits={splits} setTab={setTab}/>}
      {tab==="splits"&&<SplitsTab splits={splits} setSplits={setSplits} toast={msg=>setToast(msg)}/>}
      {tab==="log"&&<LogTab workouts={workouts} setWorkouts={setWorkouts} splits={splits} toast={msg=>setToast(msg)}/>}
      {tab==="history"&&<HistoryTab workouts={workouts} setWorkouts={setWorkouts} toast={msg=>setToast(msg)}/>}
      <div style={{textAlign:"center",padding:"28px 20px 40px",fontFamily:"'Press Start 2P',monospace",fontSize:"7px",color:"var(--border2)",lineHeight:2.5}}>
        IRON QUEST v2.0 · SAVING TO LOCAL SCROLL<br/><span style={{opacity:0.5}}>NO SKIPPING LEG DAY. THIS IS LAW.</span>
      </div>
      {toast&&<Toast msg={toast} onClose={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
